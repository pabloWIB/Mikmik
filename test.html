<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación en Viewport Mejorada</title>
    <style>
        .spacer {
            height: 100vh;
        }

        .animation-target {
            width: 200px;
            height: 200px;
            background-color: #3498db;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.5s ease-out;
        }

        .animationN1 {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Contenedor con altura para poder hacer scroll -->
    <div class="spacer"></div>

    <!-- Elemento que queremos animar -->
    <div id="mainAnimation1" class="animation-target">
        Contenido para animar
    </div>

    <!-- Más espacio para scroll -->
    <div class="spacer"></div>

    <script>
        // VIEWPORT FUNCTION
        function isElementInViewport(element) {
            if (!element) return false;
            
            var rect = element.getBoundingClientRect();
            var windowHeight = window.innerHeight || document.documentElement.clientHeight;
            var windowWidth = window.innerWidth || document.documentElement.clientWidth;

            return (
                rect.top <= windowHeight &&
                rect.bottom >= 0 &&
                rect.left <= windowWidth &&
                rect.right >= 0
            );
        }

        // Función mejorada de toggle animation
        function toggleAnimationN1() {
            var targetSection = document.getElementById("mainAnimation1");
            
            if (!targetSection) {
                console.error('Elemento mainAnimation1 no encontrado');
                return;
            }

            if (isElementInViewport(targetSection)) {
                targetSection.classList.add('animationN1');
            } else {
                // Si quieres que la animación se quite cuando no está en viewport,
                // descomenta la siguiente línea
                targetSection.classList.remove('animationN1');
            }
        }

        // Función para reiniciar la animación al volver arriba
        function scrollValue3() {
            var targetSection = document.getElementById("mainAnimation1");
            if (!targetSection) return;

            var scroll = window.scrollY;
            if (scroll < 10) {
                targetSection.classList.remove('animationN1');
            }
        }

        // Event Listeners con throttling para mejor rendimiento
        let throttleTimer;
        const throttleDelay = 100; // milisegundos

        function throttledScrollHandler() {
            if (!throttleTimer) {
                throttleTimer = setTimeout(() => {
                    toggleAnimationN1();
                    scrollValue3();
                    throttleTimer = null;
                }, throttleDelay);
            }
        }

        // Agregamos los event listeners
        window.addEventListener("scroll", throttledScrollHandler);
        window.addEventListener("resize", throttledScrollHandler);

        // Ejecutar la primera vez cuando carga la página
        document.addEventListener('DOMContentLoaded', () => {
            toggleAnimationN1();
        });
    </script>
</body>
</html>
